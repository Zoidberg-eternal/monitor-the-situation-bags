<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Terminal · x402</title>
<style>
  html, body { margin: 0; background: #0a0c11; height: 100%; }
  body { display: grid; place-items: center; font-family: "JetBrains Mono", "SF Mono", Menlo, monospace; }
  .term {
    width: 1640px; height: 920px; background: #0e1117; border-radius: 14px;
    box-shadow: 0 30px 90px rgba(0,0,0,0.5), inset 0 0 0 1px #1c2230;
    overflow: hidden; display: grid; grid-template-rows: 36px 1fr;
  }
  .titlebar { background: #161b25; border-bottom: 1px solid #20283a; display: flex; align-items: center; padding: 0 14px; gap: 8px; color: #8c93a5; font-size: 12px; }
  .titlebar .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .titlebar .title { margin-left: 12px; }
  .out { padding: 22px 28px; color: #d9dee9; font-size: 18px; line-height: 1.55; overflow: hidden; }
  .line { white-space: pre-wrap; }
  .out .prompt { color: #14F195; }
  .out .arg    { color: #9bb0d0; }
  .out .flag   { color: #c08bff; }
  .out .key    { color: #7aa2f7; }
  .out .ok     { color: #4ade80; }
  .out .err    { color: #ef4444; }
  .out .warn   { color: #f59e0b; }
  .out .dim    { color: #6b7385; }
  .out .accent { color: #14F195; }
  .out .json   { color: #e6c07b; }
  .blink { display: inline-block; width: 10px; height: 20px; background: #d9dee9; vertical-align: middle; animation: blink 1.1s steps(2) infinite; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="term">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">cmo@solana-gateway:~ — zsh · 132×40</span>
    </div>
    <div class="out" id="out"></div>
  </div>

  <script>
    const out = document.getElementById('out');
    const CURSOR_HTML = '<span class="blink"></span>';

    // Script. Each entry: html line, post-line delay, optional typing speed.
    const lines = [
      { h: '<span class="prompt">$</span> <span class="accent">curl</span> <span class="arg">-s</span> <span class="arg">https://gateway.monitor.dev/api/v1/tokens/deep-analysis/8ZQkLXuTC2hMmL8aFu1QFnrYKvNL3WjGwHVHcKptLnP</span>', wait: 700, speed: 22 },
      { h: '<span class="warn">HTTP/1.1 402 Payment Required</span>', wait: 250 },
      { h: '<span class="dim">accept-payment: solana usdc 0.10 to G7w…Vp2 · memo "deep-analysis"</span>', wait: 250 },
      { h: '<span class="dim">retry-after-tx: include header x-tx-sig=&lt;signature&gt;</span>', wait: 700 },
      { h: '', wait: 250 },
      { h: '<span class="prompt">$</span> <span class="accent">x402</span> pay <span class="arg">--amount</span> <span class="json">0.10</span> <span class="arg">--token</span> <span class="json">USDC</span> <span class="arg">--memo</span> <span class="json">"deep-analysis"</span>', wait: 600, speed: 22 },
      { h: '<span class="dim">→ signing devnet tx with ed25519 key cmo-cli.devnet</span>', wait: 350 },
      { h: '<span class="dim">→ broadcasting to api.devnet.solana.com</span>', wait: 400 },
      { h: '<span class="ok">✓ tx confirmed</span> <span class="key">3xY9…aTPq</span> <span class="dim">slot 308_127_412 · 1.2s</span>', wait: 700 },
      { h: '', wait: 200 },
      { h: '<span class="prompt">$</span> <span class="accent">curl</span> <span class="arg">-s</span> <span class="arg">-H</span> <span class="json">"x-tx-sig: 3xY9…aTPq"</span> <span class="arg">https://gateway.monitor.dev/api/v1/tokens/deep-analysis/8ZQkLXuT…tLnP</span>', wait: 500, speed: 22 },
      { h: '<span class="ok">HTTP/1.1 200 OK</span>', wait: 200 },
      { h: '<span class="dim">content-type: application/json · content-length: 4.1 KB</span>', wait: 400 },
      { h: '<span class="json">{</span>', wait: 120 },
      { h: '  <span class="key">"mint"</span>: <span class="json">"8ZQkLXuTC…tLnP"</span>,', wait: 80 },
      { h: '  <span class="key">"symbol"</span>: <span class="json">"WIRED"</span>,', wait: 80 },
      { h: '  <span class="key">"composite_risk"</span>: <span class="json">64</span>,', wait: 80 },
      { h: '  <span class="key">"verdict"</span>: <span class="json">"RISK · pump-and-dump pattern (p=0.83)"</span>,', wait: 100 },
      { h: '  <span class="key">"swarm"</span>: <span class="json">{ "personas": 137, "consensus": 0.82, "dissent": 0.04 }</span>,', wait: 100 },
      { h: '  <span class="key">"signals"</span>: <span class="json">[ "velocity_z=+3.4", "holder_concentration=0.71", "sentiment_velocity=+0.62" ]</span>,', wait: 120 },
      { h: '  <span class="key">"explainer"</span>: <span class="json">"see /audit/3xY9…aTPq"</span>', wait: 100 },
      { h: '<span class="json">}</span>', wait: 700 },
      { h: '', wait: 200 },
      { h: '<span class="prompt">$</span>', wait: 800 },
    ];

    // Container layout: we keep a stable list of completed-line elements,
    // plus one "current line" div whose innerHTML we mutate while typing.
    let currentLine = null;
    function pushLine(html) {
      // commit the in-progress line (if any) without cursor
      if (currentLine) currentLine.querySelector('.cursor')?.remove();
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = html + '<span class="cursor">' + CURSOR_HTML.match(/<span class="blink"><\/span>/)[0] + '</span>';
      out.appendChild(div);
      currentLine = div;
    }
    function setCurrent(html) {
      if (!currentLine) pushLine('');
      currentLine.innerHTML = html + '<span class="cursor">' + '<span class="blink"></span>' + '</span>';
    }
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function tokenize(html) {
      const r = [];
      let i = 0;
      while (i < html.length) {
        if (html[i] === '<') {
          const j = html.indexOf('>', i);
          r.push({ tag: html.slice(i, j + 1) });
          i = j + 1;
        } else {
          let j = i;
          while (j < html.length && html[j] !== '<') j++;
          r.push({ text: html.slice(i, j) });
          i = j;
        }
      }
      return r;
    }

    async function typeLine(html, speed) {
      // Start a new empty line and type into it.
      pushLine('');
      const tokens = tokenize(html);
      let buf = '';
      for (const t of tokens) {
        if (t.tag) {
          buf += t.tag;
          setCurrent(buf);
        } else {
          for (const ch of t.text) {
            buf += ch;
            setCurrent(buf);
            await sleep(speed);
          }
        }
      }
    }

    async function instantLine(html) {
      pushLine(html);
    }

    (async () => {
      await sleep(500);
      for (const ln of lines) {
        if (ln.h === '') {
          // blank line
          if (currentLine) currentLine.querySelector('.cursor')?.remove();
          const blank = document.createElement('div');
          blank.className = 'line';
          blank.innerHTML = '&nbsp;';
          out.appendChild(blank);
          currentLine = null;
        } else if (ln.speed) {
          await typeLine(ln.h, ln.speed);
        } else {
          await instantLine(ln.h);
        }
        await sleep(ln.wait || 200);
      }
    })();
  </script>
</body>
</html>
