services:
  monitor:
    build: .
    ports:
      - "8402:8402"
    environment:
      - MIROSHARK_URL=http://miroshark:5001
      - HOST=0.0.0.0
      - PORT=8402
      - BAGS_FM_API_KEY=${BAGS_FM_API_KEY:-}
    depends_on:
      - miroshark

  solana-gateway:
    build: ./solana-gateway
    ports:
      - "3403:3403"
    environment:
      - PORT=3403
      - UPSTREAM_URL=http://monitor:8402
      - SOLANA_ADDRESS=${SOLANA_ADDRESS:-}
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
    depends_on:
      - monitor

  miroshark:
    build:
      # Vendored, pinned MiroShark source (AGPL-3.0) lives in ./miroshark so a
      # fresh clone + `docker compose up --build` works with zero extra steps.
      # See ./miroshark/VENDOR.md for the pinned commit. (ZERA-600 / ZERA-499)
      context: ./miroshark
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
      - "3000:3000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=miroshark
      # LLM config for the MiroShark swarm. Judge supplies LLM_API_KEY in the
      # single bags .env; defaults match the proven-good OpenRouter + mimo setup
      # so the simulation/consensus backend comes up with only the key set.
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-xiaomi/mimo-v2-flash}
      # ZERA-600 demonstrative preset (DEFAULT on the documented one command):
      # a credible multi-agent debate that fits an attainable Docker memory
      # ceiling. The full 10-persona x parallel run OOMs even at 16 GB, so the
      # default is a bounded cohort, few rounds, single platform. Each knob is
      # judge-overridable in the bags .env; set MIROSHARK_SIM_PLATFORM=parallel
      # + MIROSHARK_DEMO_MAX_PERSONAS=0 + WONDERWALL_DEFAULT_MAX_ROUNDS=10 for
      # the full (heavier, opt-in) run.
      - MIROSHARK_DEMO_MAX_PERSONAS=${MIROSHARK_DEMO_MAX_PERSONAS:-4}
      - WONDERWALL_DEFAULT_MAX_ROUNDS=${WONDERWALL_DEFAULT_MAX_ROUNDS:-3}
      - MIROSHARK_SIM_PLATFORM=${MIROSHARK_SIM_PLATFORM:-reddit}
      # ZERA-600: embeddings power every agent's knowledge-graph retrieval
      # during the debate. MiroShark's upstream default is a local Ollama at
      # localhost:11434 — absent from this 4-service stack, so without this
      # the debate wedges on connection-refused retries and produces ZERO
      # rounds/actions (documented /deep-analysis stays `pending` forever).
      # Default to the SAME OpenAI-compatible endpoint + key the judge already
      # supplies for the LLM, so the documented one command runs end-to-end
      # with no extra service and no extra credential. All judge-overridable.
      # NOTE: embedding_service builds `{EMBEDDING_BASE_URL}/v1/embeddings`, so
      # EMBEDDING_BASE_URL is the host ROOT (no /v1) — unlike LLM_BASE_URL which
      # includes /v1. Default to OpenAI's root + reuse the judge's LLM key (no
      # extra credential). Override for a non-OpenAI embedding backend.
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.openai.com}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-${LLM_API_KEY:-}}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/miroshark
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
